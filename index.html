<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-DocuQuest | Bukal INHS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(135deg,#dcfce7,#bbf7d0,#86efac);
  font-family:sans-serif;
}
.hidden{display:none;}
video{width:100%;border-radius:10px;}
</style>
</head>

<body class="p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold text-center mb-4">E-DocuQuest</h1>

<!-- REQUEST -->
<form id="form" class="space-y-3">

<input id="name" placeholder="Full Name" required class="w-full p-3 border rounded">
<input id="email" placeholder="Email" required class="w-full p-3 border rounded">
<input id="contact" placeholder="Contact" class="w-full p-3 border rounded">

<select id="document" class="w-full p-3 border rounded" required>
<option value="">Select Document</option>
<option>Form 137/SF10 (Permanent Record)</option>
<option>Form 138/SF9 (Report Card)</option>
<option>Certificate of Good Moral</option>
<option>Certificate of Graduation</option>
<option>Request/Transfer Letter</option>
</select>

<textarea id="reason" placeholder="Reason" class="w-full p-3 border rounded"></textarea>

<label class="font-bold">Upload Government/School ID</label>
<input id="govtId" type="file" accept="image/*" required>

<label class="font-bold">Selfie (Upload or Camera)</label>
<input id="selfie" type="file" accept="image/*">

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>
<button type="button" onclick="capture()" class="w-full bg-green-700 text-white p-2 rounded mt-2">
📷 Capture Selfie
</button>

<canvas id="canvas" class="hidden"></canvas>

<button class="w-full bg-green-800 text-white p-3 rounded font-bold">
Submit Request
</button>

</form>

<p id="msg" class="text-center font-bold mt-3"></p>

<hr class="my-6">

<!-- TRACK -->
<h2 class="text-xl font-bold mb-2">Track Request</h2>

<input id="trackId" placeholder="BNHS-XXXXX" class="w-full p-3 border rounded mb-2 text-center">

<button onclick="track()" class="w-full bg-black text-white p-3 rounded">
Check Status
</button>

<p id="status" class="text-center font-bold mt-3"></p>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwEol8yDm-nvykMZGieGDr9-sBXrU6NXw5dfDzIE3P4-FgALH68TRYCv3trxjBlTL6r/exec";

/* CAMERA START */
const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})
.then(stream=>{
video.srcObject=stream;
})
.catch(()=>alert("Camera not allowed"));

let capturedImage="";

/* CAPTURE */
function capture(){
const canvas=document.getElementById("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");

/* NOT MIRRORED */
ctx.drawImage(video,0,0);

capturedImage=canvas.toDataURL("image/jpeg",0.5); // compressed

alert("Selfie captured!");
}

/* BASE64 */
function toBase64(file){
return new Promise(res=>{
let reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(file);
});
}

/* SUBMIT */
form.onsubmit=async(e)=>{
e.preventDefault();

let id="BNHS-"+Math.floor(10000+Math.random()*90000);

let govt=await toBase64(govtId.files[0]);

let selfieData="";

/* PRIORITY: CAMERA */
if(capturedImage){
selfieData=capturedImage;
}else if(selfie.files[0]){
selfieData=await toBase64(selfie.files[0]);
}

await fetch(URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
action:"submit",
trackingId:id,
name:name.value,
email:email.value,
contact:contact.value,
document:document.value,
reason:reason.value,
govtId:govt,
selfie:selfieData
})
});

msg.innerHTML="✅ Submitted! Your Tracking ID: "+id;

form.reset();
capturedImage="";
};

/* TRACK (FIXED) */
async function track(){
let id=trackId.value.trim().toUpperCase();

if(!id) return;

try{
let res=await fetch(URL+"?action=track&trackingId="+id);
let data=await res.json();

if(data.status==="Not Found"){
status.innerText="❌ Not Found";
}else{
status.innerText="📄 Status: "+data.status;
}

}catch(e){
status.innerText="⚠️ Error tracking request";
}
}
</script>

</body>
</html>
