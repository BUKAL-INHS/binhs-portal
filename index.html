<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-DocuQuest | Bukal INHS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.hidden-section{display:none;}
.nav-btn{border-bottom:2px solid transparent;}
.nav-btn:hover{color:#064e3b;border-color:#064e3b;}
.active-nav{color:#064e3b;border-color:#064e3b;font-weight:bold;}
body{background:linear-gradient(135deg,#dcfce7,#bbf7d0,#86efac);}
.glass{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);}
</style>
</head>

<body class="font-sans text-gray-800">

<nav class="bg-white/70 p-4 flex justify-center gap-8 sticky top-0">
<button onclick="show('request')" id="btn-request" class="nav-btn active-nav">Request</button>
<button onclick="show('track')" id="btn-track" class="nav-btn">Track</button>
<button onclick="show('admin-login')" class="text-xs">Admin</button>
</nav>

<!-- REQUEST -->
<section id="request" class="max-w-2xl mx-auto p-6">
<div class="glass p-6 rounded-2xl shadow">

<h1 class="text-2xl font-bold mb-4 text-center">E-DocuQuest</h1>

<form id="form" class="space-y-3">

<input id="name" placeholder="Full Name" required class="w-full p-3 border rounded">
<input id="email" placeholder="Email" required class="w-full p-3 border rounded">
<input id="contact" placeholder="Contact" class="w-full p-3 border rounded">

<select id="document" required class="w-full p-3 border rounded">
<option value="">Select Document</option>
<option>Form 137</option>
<option>Form 138</option>
<option>Good Moral</option>
<option>Graduation</option>
</select>

<textarea id="reason" placeholder="Reason" required class="w-full p-3 border rounded"></textarea>

<label>Upload Government ID</label>
<input id="govtId" type="file" accept="image/*" required>

<label>Upload Selfie</label>
<input id="selfie" type="file" accept="image/*" required>

<button class="w-full bg-green-700 text-white p-3 rounded">Submit</button>
</form>

<div id="msg" class="mt-4"></div>
</div>
</section>

<!-- TRACK -->
<section id="track" class="hidden-section max-w-xl mx-auto p-6">
<div class="glass p-6 rounded-2xl text-center">
<input id="trackId" placeholder="BNHS-XXXXX" class="w-full p-3 border mb-3 text-center">
<button onclick="track()" class="bg-green-700 text-white p-3 w-full rounded">Check</button>
<p id="status" class="mt-4 font-bold"></p>
</div>
</section>

<!-- ADMIN LOGIN -->
<section id="admin-login" class="hidden-section max-w-sm mx-auto p-6">
<div class="glass p-6 rounded-2xl">
<input id="pass" type="password" placeholder="Admin Password" class="w-full p-3 border mb-3">
<button onclick="login()" class="w-full bg-black text-white p-3 rounded">Login</button>
</div>
</section>

<!-- ADMIN PANEL -->
<section id="admin" class="hidden-section max-w-5xl mx-auto p-6">
<div class="glass p-6 rounded-2xl">

<h2 class="text-xl font-bold mb-4">Admin Panel</h2>

<table class="w-full text-sm">
<thead class="bg-green-700 text-white">
<tr>
<th class="p-2">ID</th>
<th>Name</th>
<th>Doc</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>
</section>

<script>
const URL="https://script.google.com/macros/s/AKfycbzslIE8UmCW8ASJb2JVB6gM2I-G9H2F62NF7czeR4pBcqNJDmBfdk0Qf9i_QeQdvu0D/exec";

function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.add('hidden-section'));
document.getElementById(id).classList.remove('hidden-section');
}

document.getElementById('form').addEventListener('submit',async e=>{
e.preventDefault();

let id="BNHS-"+Math.floor(10000+Math.random()*90000);

let f=new FormData();
f.append("trackingId",id);
f.append("name",name.value);
f.append("email",email.value);
f.append("contact",contact.value);
f.append("document",document.value);
f.append("reason",reason.value);
f.append("govtId",govtId.files[0]);
f.append("selfie",selfie.files[0]);

await fetch(URL,{method:"POST",body:f});

msg.innerHTML="Tracking ID: <b>"+id+"</b>";
form.reset();
});

async function track(){
let res=await fetch(URL,{method:"POST",body:JSON.stringify({action:"track",trackingId:trackId.value})});
let d=await res.json();
status.innerText=d.status;
}

async function login(){
let res=await fetch(URL,{method:"POST",body:JSON.stringify({action:"login",password:pass.value})});
if(await res.text()=="authorized"){
show("admin"); load();
}else alert("Denied");
}

async function load(){
let res=await fetch(URL,{method:"POST",body:JSON.stringify({action:"loadAll"})});
let d=await res.json();

table.innerHTML="";
d.slice(1).reverse().forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[2]}</td>
<td>${r[5]}</td>
<td>${r[6]}</td>
<td>
<button onclick="act('${r[0]}','verifyId')">ID</button>
<button onclick="act('${r[0]}','verifySelfie')">Selfie</button>
<button onclick="act('${r[0]}','archive')">Archive</button>
<button onclick="act('${r[0]}','delete')">Delete</button>
</td>
</tr>`;
});
}

async function act(id,a){
await fetch(URL,{method:"POST",body:JSON.stringify({action:a,trackingId:id})});
load();
}
</script>

</body>
</html>
