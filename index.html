<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-DocuQuest | Bukal INHS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.hidden{display:none;}
body{
background:linear-gradient(135deg,#dcfce7,#bbf7d0,#86efac);
font-family:sans-serif;
}
.upload-box{
border:2px dashed #16a34a;
padding:15px;
border-radius:12px;
background:#f0fdf4;
text-align:center;
cursor:pointer;
}
</style>
</head>

<body class="text-gray-800">

<!-- NAV -->
<nav class="p-4 bg-white text-center shadow space-x-4">
<button onclick="show('request')">Request</button>
<button onclick="show('track')">Track</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- REQUEST -->
<section id="request" class="max-w-xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-4 text-center">E-DocuQuest Request</h1>

<form id="form" class="space-y-4">

<input id="name" required placeholder="Full Name" class="w-full p-3 border rounded">
<input id="email" required placeholder="Email" class="w-full p-3 border rounded">
<input id="contact" placeholder="Contact Number" class="w-full p-3 border rounded">

<select id="document" required class="w-full p-3 border rounded">
<option value="">Select Document</option>
<option>Form 137 / SF10 (Permanent Record)</option>
<option>Form 138 / SF9 (Report Card)</option>
<option>Certificate of Good Moral</option>
<option>Certificate of Graduation</option>
<option>Request / Transfer Letter</option>
</select>

<textarea id="reason" required placeholder="Reason" class="w-full p-3 border rounded"></textarea>

<!-- ID -->
<div class="upload-box" onclick="govtId.click()">
<p class="font-bold">Upload Government / School ID</p>
<input id="govtId" type="file" accept="image/*" hidden required>
<img id="idPreview" class="hidden mt-2 mx-auto max-h-40 rounded shadow">
</div>

<!-- SELFIE -->
<div class="upload-box">
<p class="font-bold">Selfie Verification</p>

<div class="flex justify-center gap-2 mt-2">
<button type="button" onclick="selfie.click()" class="bg-green-700 text-white px-3 py-1 rounded">Upload</button>
<button type="button" onclick="openCamera()" class="bg-black text-white px-3 py-1 rounded">Camera</button>
</div>

<input id="selfie" type="file" accept="image/*" hidden>

<video id="video" class="hidden mt-3 w-full rounded"></video>
<button type="button" id="captureBtn" onclick="capture()" class="hidden bg-red-600 text-white px-3 py-1 mt-2 rounded">Capture</button>

<img id="selfiePreview" class="hidden mt-2 mx-auto max-h-40 rounded shadow">

<canvas id="canvas" class="hidden"></canvas>
</div>

<button class="w-full bg-green-700 text-white p-3 rounded font-bold">
Submit Request
</button>

</form>

<p id="msg" class="mt-4 text-center font-bold"></p>

</section>

<!-- TRACK -->
<section id="track" class="hidden max-w-xl mx-auto p-6">
<h1 class="text-xl font-bold mb-3">Track Request</h1>
<input id="trackId" placeholder="BNHS-XXXXX" class="w-full p-3 border mb-3">
<button onclick="track()" class="w-full bg-green-700 text-white p-3">Check</button>
<p id="status" class="mt-3 font-bold"></p>
</section>

<!-- ADMIN LOGIN -->
<section id="admin" class="hidden max-w-sm mx-auto p-6">
<h1 class="text-xl font-bold mb-3 text-center">Admin Secure Login</h1>

<input id="adminEmail" placeholder="Email" class="w-full p-3 border mb-2">
<input id="adminPass" type="password" placeholder="Password" class="w-full p-3 border mb-2">
<input id="adminKey" placeholder="Pass Key (BINHS-2026)" class="w-full p-3 border mb-3">

<button onclick="login()" class="w-full bg-black text-white p-3 rounded">
Login
</button>
</section>

<!-- ADMIN PANEL -->
<section id="adminPanel" class="hidden max-w-6xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>

<button onclick="loadData()" class="bg-green-700 text-white px-4 py-2 mb-4">
Refresh
</button>

<div class="overflow-auto">
<table class="w-full border text-sm">
<thead class="bg-green-700 text-white">
<tr>
<th>ID</th>
<th>Name</th>
<th>Document</th>
<th>Status</th>
<th>Verified</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</section>

<script>
const URL="https://script.google.com/macros/s/AKfycbwEol8yDm-nvykMZGieGDr9-sBXrU6NXw5dfDzIE3P4-FgALH68TRYCv3trxjBlTL6r/exec";

/* NAV */
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* PREVIEW */
govtId.onchange=()=>{idPreview.src=URL.createObjectURL(govtId.files[0]);idPreview.classList.remove("hidden");};
selfie.onchange=()=>{selfiePreview.src=URL.createObjectURL(selfie.files[0]);selfiePreview.classList.remove("hidden");};

/* CAMERA */
let stream;

async function openCamera(){
video.classList.remove("hidden");
captureBtn.classList.remove("hidden");

stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode:{ ideal:"environment" } }
});

video.srcObject = stream;
}

function capture(){
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);

selfiePreview.src = canvas.toDataURL("image/png");
selfiePreview.classList.remove("hidden");

stream.getTracks().forEach(t=>t.stop());

video.classList.add("hidden");
captureBtn.classList.add("hidden");
}

/* BASE64 */
function toBase64(file){
return new Promise(resolve=>{
let reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(file);
});
}

/* SUBMIT */
form.onsubmit=async(e)=>{
e.preventDefault();

let id="BNHS-"+Math.floor(10000+Math.random()*90000);

let govt=await toBase64(govtId.files[0]);
let selfieData="";

if(canvas.width>0){
selfieData=canvas.toDataURL("image/png");
}else if(selfie.files[0]){
selfieData=await toBase64(selfie.files[0]);
}

await fetch(URL,{
method:"POST",
body:JSON.stringify({
action:"submit",
trackingId:id,
name:name.value,
email:email.value,
contact:contact.value,
document:document.value,
reason:reason.value,
govtId:govt,
selfie:selfieData
})
});

msg.innerHTML="✅ Tracking ID: "+id;
form.reset();
};

/* TRACK */
async function track(){
let r=await fetch(URL,{
method:"POST",
body:JSON.stringify({action:"track",trackingId:trackId.value})
});
let d=await r.json();
status.innerText=d.status||"Not Found";
}

/* LOGIN */
async function login(){
let r=await fetch(URL,{
method:"POST",
body:JSON.stringify({
action:"login",
email:adminEmail.value,
password:adminPass.value,
key:adminKey.value
})
});

if(await r.text()=="authorized"){
show("adminPanel");
loadData();
}else{
alert("Denied");
}
}

/* LOAD ADMIN */
async function loadData(){
let res=await fetch(URL,{
method:"POST",
body:JSON.stringify({action:"loadAll"})
});
let data=await res.json();

table.innerHTML="";

data.slice(1).reverse().forEach(row=>{
table.innerHTML+=`
<tr class="border">
<td>${row[0]}</td>
<td>${row[2]}</td>
<td>${row[5]}</td>
<td>${row[9]}</td>
<td>${row[10]}</td>
<td>
<button onclick="verify('${row[0]}')" class="bg-blue-500 text-white px-2">Verify</button>
<button onclick="archive('${row[0]}')" class="bg-yellow-500 text-white px-2">Archive</button>
<button onclick="del('${row[0]}')" class="bg-red-600 text-white px-2">Delete</button>
</td>
</tr>
`;
});
}

async function verify(id){
await fetch(URL,{method:"POST",body:JSON.stringify({action:"verify",trackingId:id})});
loadData();
}

async function archive(id){
await fetch(URL,{method:"POST",body:JSON.stringify({action:"archive",trackingId:id})});
loadData();
}

async function del(id){
if(confirm("Delete?")){
await fetch(URL,{method:"POST",body:JSON.stringify({action:"delete",trackingId:id})});
loadData();
}
}
</script>

</body>
</html>
